{% extends "base.html" %}
{% block content %}
<h1>Coordenadas</h1>
<p>Sube un archivo .xlsx o .csv con las columnas <strong>Ciudad</strong> y <strong>País</strong>.</p>
<div class="actions">
  <a class="button secondary" href="/templates/coordenadas">Descargar plantilla</a>
</div>
<form class="upload-form" action="/api/coordenadas" method="post" enctype="multipart/form-data">
  <input type="file" name="file" accept=".xlsx,.csv" required>
  <button class="button" type="submit">Procesar archivo</button>
</form>
{% endblock %}
